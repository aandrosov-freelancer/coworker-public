publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  animations: ^2.2.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_dotenv: ^6.0.1
  flutter_svg: ^2.2.4
  flutter_svg_provider: ^1.0.7
  freezed_annotation: ^3.1.0
  get: ^4.7.3
  google_fonts: ^8.1.0
  intl: ^0.19.0
  json_annotation: ^4.11.0
  lottie: ^3.3.3
  pinput: ^6.0.2
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.13.2

flutter:
